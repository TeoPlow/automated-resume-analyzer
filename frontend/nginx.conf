server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # In development we disable HTML caching so app shell updates are visible immediately.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA — all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Gateway
    location /api/ {
        proxy_pass http://gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File uploads up to 10MB
        client_max_body_size 11m;
    }

    # Avoid stale JS/CSS in local docker runs when files are mounted from host.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
